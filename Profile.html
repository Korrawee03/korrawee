<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="Profire.css">
</head>
<body>

  
  <!-- ปุ่มขีด 3 ขีด -->
  <div class="menu-btn" id="menuBtn">&#9776;</div>

  <!-- เมนู dropdown -->
 <div class="dropdown-menu" id="dropdownMenu">
    <a href="Home.html">Home</a>
    <a href="Love.html">Liking</a>
    <a href="Playlist.html">Playlist</a>
    <a href="School.html">Education</a>
    <a href="Contact.html">Contact</a>
  </div>
  <script>
    const menuBtn = document.getElementById("menuBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");

    // เปิด/ปิดเมนูเมื่อกดปุ่ม
    menuBtn.addEventListener("click", () => {
      dropdownMenu.classList.toggle("active");
    });

    // ปิดเมนูเมื่อคลิกนอกเมนู
    document.addEventListener("click", (e) => {
      if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.classList.remove("active");
      }
    });
  </script>

  <!-- กล่องโปรไฟล์ -->
  <div class="card-wrapper">
    
    <!-- กล่องน้ำเงิน -->
    <div class="blue-box top-left"></div>
    <div class="blue-box bottom-right"></div>

    <!-- กล่องครีม -->
    <div class="cream-box">
      <div class="profile-header">
        <div class="profile-pic">
          <img src="K.jpg" alt="Profile">
        </div>
        <h2>Profile</h2>
      </div>

      <div class="profile-info">
        <p><strong>ชื่อ :</strong> นางสาวกรรวี มะลิเลาะ</p>
        <p><strong>ชื่อเล่น :</strong> มัดซี</p>
        <p><strong>วัน/เดือน/ปีเกิด :</strong> 3 มิถุนายน 2550</p>
        <p><strong>เชื้อชาติ :</strong> ไทย</p>
        <p><strong>สัญชาติ :</strong> ไทย</p>
        <p><strong>ศาสนา :</strong> อิสลาม</p>
        <p><strong>โรงเรียน :</strong> หมอนทองวิทยา</p>
        <p><strong>แผนการเรียน :</strong> คอมพิวเตอร์ธุรกิจ</p>
      </div>
    </div>
  </div>

</body>
</html>
